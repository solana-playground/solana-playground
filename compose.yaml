name: "solana-playground"

x-client: &client
  platform: linux/amd64
  depends_on:
    wasm:
      condition: service_completed_successfully
    server:
      condition: service_started
  build:
    context: .
    dockerfile: ./client/Dockerfile
    args:
      USER: solpg
      HAS_SERVER: true
    additional_contexts:
      solana-playground-wasm: service:wasm
      solana-playground-server: service:server
  ports:
    - ${PG_CLIENT_PORT:-3000}:3000

services:
  client:
    <<: *client
    tty: true
    stdin_open: true
    profiles:
      - dev

  client-prod:
    <<: *client
    command: ["sh", "-c", "yarn build && npx serve -s build"]
    profiles:
      - prod

  client-standalone:
    platform: linux/amd64
    depends_on:
      wasm:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./client/Dockerfile
      args:
        USER: solpg
        HAS_SERVER: ${PG_SERVER:-false}
      additional_contexts:
        solana-playground-wasm: service:wasm
    ports:
      - ${PG_CLIENT_PORT:-3000}:3000
    tty: true
    stdin_open: true
    profiles:
      - standalone

  server:
    platform: linux/amd64
    depends_on:
      - db
    build:
      context: ./server
      args:
        USER: solpg
    ports:
      - ${PG_PORT:-8080}:8080
    env_file: .env
    environment:
      - PG_DB_URI=${PG_DB_URI:-postgresql://postgres:postgres@db:5432/solpg}
    profiles:
      - dev
      - prod

  wasm:
    platform: linux/amd64
    build:
      context: ./wasm
    profiles:
      - dev
      - prod
      - standalone

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=solpg
    ports:
      - 5432:5432
    profiles:
      - dev
      - prod

volumes:
  postgres_data:
