name: Checks

# Reusable workflow shared by ci.yml (PR validation) and cicd.yml (master
# deploy gate). Single source of truth for format/clippy/build steps so the
# two trigger workflows can't drift apart.
on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: "Rust toolchain channel used for `cargo fmt --check` in the server workspace (host triple is resolved automatically by rustup)."
        required: false
        type: string
        default: nightly
      wasm_rust_toolchain:
        description: "Rust toolchain channel used for `cargo fmt --check` and `cargo clippy` in the wasm workspace. Pinned because wasm deps (e.g. ahash 0.8.3) reference nightly features removed in newer toolchains."
        required: false
        type: string
        default: "1.75.0"

jobs:
  format_client:
    name: Format client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: client/.nvmrc
          cache: "yarn"
          cache-dependency-path: "client/yarn.lock"

      # Make the locked prettier resolvable on PATH (no global install,
      # no full `yarn install`), then run the package.json script so
      # CI mirrors local dev exactly.
      - name: Check format
        run: |
          prettier_version=$(awk "/^prettier/{getline; print}" yarn.lock | cut -d "\"" -f 2)
          npx --yes --package=prettier@$prettier_version -- yarn check-format

  format_server:
    name: Format server
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Add rustfmt toolchain(${{ inputs.rust_toolchain }})
        run: rustup component add --toolchain ${{ inputs.rust_toolchain }} rustfmt

      - name: Check format toolchain(${{ inputs.rust_toolchain }})
        run: cargo +${{ inputs.rust_toolchain }} fmt --check

  format_wasm:
    name: Format WASM
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wasm

    steps:
      - uses: actions/checkout@v6

      - name: Add rustfmt toolchain(${{ inputs.wasm_rust_toolchain }})
        run: rustup component add --toolchain ${{ inputs.wasm_rust_toolchain }} rustfmt

      - name: Check format toolchain(${{ inputs.wasm_rust_toolchain }})
        run: cargo +${{ inputs.wasm_rust_toolchain }} fmt --check

  test_web:
    name: Test web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: web/.nvmrc
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Install deps
        run: corepack enable && yarn install --frozen-lockfile

      - name: Lint and format check
        run: yarn lint

      - name: Run tests
        run: yarn test

  clippy_server:
    name: Clippy Server
    runs-on: ubuntu-latest
    needs: format_server

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v6

      - name: Add clippy
        run: rustup component add clippy

      - name: Check clippy warnings
        run: cargo clippy --all-targets -- -D warnings

  clippy_wasm:
    name: Clippy WASM
    runs-on: ubuntu-latest
    needs: format_wasm

    defaults:
      run:
        working-directory: wasm

    steps:
      - uses: actions/checkout@v6

      - name: Add clippy toolchain(${{ inputs.wasm_rust_toolchain }})
        run: rustup component add --toolchain ${{ inputs.wasm_rust_toolchain }} clippy

      - name: Check clippy warnings toolchain(${{ inputs.wasm_rust_toolchain }})
        run: cargo +${{ inputs.wasm_rust_toolchain }} clippy --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      [format_client, format_server, format_wasm, clippy_server, clippy_wasm]

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: client/.nvmrc
          cache: "yarn"
          cache-dependency-path: "client/yarn.lock"

      - name: Sync rust-toolchain
        run: rustc --version

      # `wasm/build.sh` builds the wasm workspace plus three standalone
      # crates each with their own target dir. Listing them all lets
      # rust-cache do per-target lookups instead of falling back to the
      # repo root (which has no Cargo.toml).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            wasm
            wasm/playnet
            wasm/rust-analyzer
            wasm/rustfmt

      - name: Setup
        run: yarn setup

      # This confirms that there are no changes after setup script runs
      - name: Check git status
        run: git status --porcelain | wc -l | grep -q -w "0"

      - name: Build
        run: yarn build
