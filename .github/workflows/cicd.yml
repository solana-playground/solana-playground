name: CICD

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  # Single source of truth for the App Engine version tag, consumed by both
  # deploy jobs so server and web land under the same version label.
  resolve_version:
    name: Resolve deploy version
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      version_tag: ${{ steps.tag.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - id: tag
        name: Compute App Engine version tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          # Replace periods with dashes for App Engine compatibility
          NORMALIZED_TAG=${TAG//./-}
          echo "version_tag=${NORMALIZED_TAG}" >> "$GITHUB_OUTPUT"

  deploy_server:
    name: Deploy Playground Server
    runs-on: ubuntu-latest
    needs:
      - checks
      - resolve_version

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Set up Cloud SDK authentication
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure GCloud
        run: |-
          gcloud config set account ${{ secrets.SERVICE_ACCOUNT }}
          gcloud config set project ${{ secrets.PROJECT_ID }}

      - name: Deploy to App Engine with specific version (no promote)
        working-directory: server
        run: |
          gcloud app deploy app.yaml \
            --version=${{ needs.resolve_version.outputs.version_tag }} \
            --no-promote \
            --quiet

  deploy_web:
    name: Deploy Playground Web
    runs-on: ubuntu-latest
    needs:
      - checks
      - resolve_version

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            client/yarn.lock
            web/yarn.lock

      - name: Sync rust-toolchain
        run: rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: Build client bundle
        working-directory: client
        env:
          # The Hono BFF proxies the API at the same origin, so the bundle
          # must be built without an absolute server URL.
          REACT_APP_SERVER_URL: ""
        run: |
          yarn setup
          yarn build

      - name: Stage web deploy artifacts
        run: |
          rm -rf web/build
          cp -r client/build web/build
          # GAE uses the file literally named `Dockerfile`; the compose-only
          # version (which depends on buildx additional_contexts) is not
          # usable here, so swap it for the self-contained variant.
          mv web/Dockerfile.gae web/Dockerfile

      - name: Set up Cloud SDK authentication
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure GCloud
        run: |-
          gcloud config set account ${{ secrets.SERVICE_ACCOUNT }}
          gcloud config set project ${{ secrets.PROJECT_ID }}

      - name: Deploy to App Engine with specific version (no promote)
        working-directory: web
        run: |
          gcloud app deploy app.yaml \
            --version=${{ needs.resolve_version.outputs.version_tag }} \
            --no-promote \
            --quiet
