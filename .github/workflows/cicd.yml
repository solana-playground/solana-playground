name: CICD

# Manual deploy. Trigger from the Actions tab → "CICD" → "Run workflow".
# Push to master does NOT auto-deploy; promotion is an explicit operator action.
# Uncomment the `push:` block below to re-enable automatic deploys on master.
on:
  # push:
  #   branches:
  #     - master

  workflow_dispatch:

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  # Resolves the App Engine version tag from the latest git tag so the deploy
  # job lands under a predictable, release-aligned version label.
  resolve_version:
    name: Resolve deploy version
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      version_tag: ${{ steps.tag.outputs.version_tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - id: tag
        name: Compute App Engine version tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          # Replace periods with dashes for App Engine compatibility
          NORMALIZED_TAG=${TAG//./-}
          echo "version_tag=${NORMALIZED_TAG}" >> "$GITHUB_OUTPUT"

  deploy_server:
    name: Deploy Playground Server
    runs-on: ubuntu-latest
    needs:
      - checks
      - resolve_version

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Set up Cloud SDK authentication
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure GCloud
        run: |-
          gcloud config set account ${{ secrets.SERVICE_ACCOUNT }}
          gcloud config set project ${{ secrets.PROJECT_ID }}

      - name: Deploy to App Engine with specific version (no promote)
        working-directory: server
        run: |
          gcloud app deploy app.yaml \
            --version=${{ needs.resolve_version.outputs.version_tag }} \
            --no-promote \
            --quiet
