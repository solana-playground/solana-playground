name: Deploy Client (Vercel)

# Manual workflow: builds the React client (CRA + craco + wasm crates) in
# CI and ships the prebuilt output to Vercel via `vercel deploy --prebuilt`.
# Vercel skips its own build step entirely so the wasm toolchain does not
# need to be installed on Vercel's build image.
#
# Trigger from the Actions tab → "Deploy Client (Vercel)" → "Run workflow".
# Secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID) are read directly from repo settings.
# REACT_APP_SERVER_URL is pulled from the Vercel project's Preview env via `vercel pull`.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)."
        required: false
        default: master
        type: string

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version-file: client/.nvmrc
          cache: yarn
          cache-dependency-path: client/yarn.lock

      - name: Sync rust-toolchain
        run: rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Preview target throughout (vercel rejects mismatched build/deploy targets with --prebuilt).
      # Pull runs before yarn build so REACT_APP_SERVER_URL gets sourced into the build shell.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build client bundle
        working-directory: client
        run: |
          set -a
          . ../.vercel/.env.preview.local
          set +a
          : "${REACT_APP_SERVER_URL:?REACT_APP_SERVER_URL missing from Vercel preview env}"
          yarn setup
          yarn build

      - name: Build Vercel output
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt output to Vercel (no auto-promote)
        # Mirror GAE `--no-promote` semantics: ship a preview deployment with
        # a unique URL; promotion to the production alias is a manual step
        # via `vercel promote <url> --prod` or the Vercel dashboard.
        run: vercel deploy --prebuilt --token="${VERCEL_TOKEN}"
