service: playground-web
runtime: custom
env: flex

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 1

# Runtime configuration is supplied via GCP-managed env vars and/or secrets.
# `PG_SERVER_URL` and `PG_API_KEY` are required at boot — inject them via
# Secret Manager or the App Engine env-var replace step in the workflow.
env_variables:
  PG_PORT: "8080"
  PG_STATIC_DIR: "build"

resources:
  cpu: 1
  memory_gb: 1
  disk_size_gb: 10
