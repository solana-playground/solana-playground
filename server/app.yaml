service: playground-server
runtime: custom
env: flex

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 1

# Runtime configuration is supplied via GCP-managed env vars and/or secrets.
# Keep this file free of credentials so the manifest is safe to commit.
env_variables:
  # Each cargo-build-sbf peaks ~3.7GB and ~1 core; sized with resources below for 4 concurrent builds.
  PG_BUILD_CONCURRENCY: "4"

resources:
  cpu: 4
  memory_gb: 16
  disk_size_gb: 50
